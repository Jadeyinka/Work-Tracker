<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Work Log</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0f0f0f;
  --surface:#1a1a1a;
  --surface2:#222;
  --border:#2e2e2e;
  --accent:#FF4E00;
  --accent-soft:rgba(255,78,0,0.1);
  --text:#f0ede8;
  --muted:#7a7570;
  --dim:#4a4845;
  --green:#4ade80;
  --green-soft:rgba(74,222,128,0.1);
  --blue:#60a5fa;
  --blue-soft:rgba(96,165,250,0.1);
  --purple:#a78bfa;
  --purple-soft:rgba(167,139,250,0.1);
  --yellow:#facc15;
  --red:#f87171;
}

body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:32px 24px}

/* ── TOP BAR ── */
.top-bar{max-width:860px;margin:0 auto 28px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
h1{font-family:'Syne',sans-serif;font-size:clamp(24px,4vw,36px);font-weight:800;line-height:1.1}
.subtitle{font-size:13px;color:var(--muted);margin-top:4px;font-weight:300}
.top-actions{display:flex;gap:10px;align-items:center;flex-shrink:0;margin-top:4px}
.btn-primary{display:flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.04em;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.88}
.btn-secondary{display:flex;align-items:center;gap:6px;background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:9px 16px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-secondary:hover{border-color:var(--accent);color:var(--text)}
.btn-secondary:disabled{opacity:.4;cursor:not-allowed;border-color:var(--border);color:var(--dim)}

/* ── STATS ── */
.stats{max-width:860px;margin:0 auto 24px;display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.stat-num{font-family:'Syne',sans-serif;font-size:26px;font-weight:800}
.stat-num.orange{color:var(--accent)}
.stat-num.green{color:var(--green)}
.stat-num.blue{color:var(--blue)}
.stat-num.purple{color:var(--purple)}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}

/* ── TABS ── */
.tabs{max-width:860px;margin:0 auto 24px;display:flex;gap:0;border-bottom:1px solid var(--border)}
.tab-btn{padding:9px 20px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;margin-bottom:-1px;transition:all .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--accent)}

/* ── PANEL ── */
.panel{display:none;max-width:860px;margin:0 auto}
.panel.active{display:block}

/* ── ENTRIES HEADER ── */
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.list-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700}
.list-count{font-size:12px;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400;margin-left:8px}
.filter-bar select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;cursor:pointer;color-scheme:dark;transition:border-color .15s}
.filter-bar select:hover,.filter-bar select:focus{border-color:var(--accent);color:var(--text)}


/* ── FILTER DROPDOWN ── */
.filter-wrap{position:relative}
.filter-btn{display:flex;align-items:center;gap:6px;background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:7px 13px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.filter-btn:hover,.filter-btn.open{border-color:var(--accent);color:var(--text)}
.filter-btn .arrow{font-size:10px;transition:transform .15s}
.filter-btn.open .arrow{transform:rotate(180deg)}
.filter-dropdown{position:absolute;right:0;top:calc(100% + 6px);background:var(--surface);border:1px solid var(--border);border-radius:10px;min-width:200px;z-index:50;overflow:hidden;display:none;animation:fadeIn .15s ease}
.filter-dropdown.open{display:block}
.filter-option{padding:9px 14px;font-size:13px;cursor:pointer;color:var(--muted);transition:background .1s}
.filter-option:hover{background:var(--surface2);color:var(--text)}
.filter-option.active{color:var(--accent);font-weight:500}
.filter-divider{height:1px;background:var(--border);margin:4px 0}

/* ── ENTRY CARDS ── */
.entry-list{display:flex;flex-direction:column;gap:8px}

.entry{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.entry-project{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);margin-bottom:4px}
.entry.meeting .entry-project{color:var(--blue)}
.entry.win .entry-project{color:var(--purple)}
.entry-text{font-size:14px;color:var(--text);line-height:1.55;font-weight:300}
.entry-detail{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
.entry-detail-row{display:flex;gap:8px;font-size:12px}
.entry-detail-label{color:var(--dim);min-width:72px;flex-shrink:0;font-size:10px;text-transform:uppercase;letter-spacing:.08em;padding-top:1px}
.entry-detail-value{color:var(--muted)}
.entry-thumb{width:52px;height:52px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer;margin-top:8px;transition:opacity .15s}
.entry-thumb:hover{opacity:.8}
.entry-meta{font-size:11px;color:var(--dim);margin-top:6px}

.entry-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.badge{padding:3px 10px;border-radius:100px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-progress{background:rgba(250,204,21,.12);color:var(--yellow)}
.badge-done{background:var(--green-soft);color:var(--green)}
.badge-blocked{background:rgba(248,113,113,.1);color:var(--red)}
.badge-meeting{background:var(--blue-soft);color:var(--blue)}
.badge-win{background:var(--purple-soft);color:var(--purple)}

.entry-actions{display:flex;gap:4px}
.action-btn{background:none;border:1px solid var(--border);border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--dim);font-size:13px;transition:all .15s;flex-shrink:0}
.action-btn:hover{border-color:#ffffff30;color:var(--text)}
.action-btn.del:hover{border-color:rgba(248,113,113,.5);color:var(--red)}

/* delete confirm inline */
.del-confirm{display:flex;align-items:center;gap:5px;animation:fadeIn .15s ease}
.del-confirm span{font-size:11px;color:var(--muted)}
.del-yes{padding:3px 8px;border-radius:5px;border:1px solid var(--red);background:rgba(248,113,113,.1);color:var(--red);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}
.del-no{padding:3px 8px;border-radius:5px;border:1px solid var(--border);background:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* ── PROJECTS TAB ── */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.proj-card-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.proj-card-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.proj-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.proj-dot.hold{background:var(--yellow)}
.proj-dot.done{background:var(--blue)}
.proj-dot.none{background:var(--dim)}
.proj-toggle{font-size:12px;color:var(--dim);transition:transform .2s}
.proj-card.open .proj-toggle{transform:rotate(180deg)}
.proj-card-body{display:none;padding:0 16px 16px;flex-direction:column;gap:12px}
.proj-card.open .proj-card-body{display:flex}
.proj-desc{font-size:13px;color:var(--muted);line-height:1.6;font-weight:300}
.proj-field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:6px;font-weight:600}
.proj-field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;outline:none;resize:none;transition:border-color .15s}
.proj-field textarea:focus{border-color:var(--accent)}
.proj-status-row{display:flex;gap:6px;flex-wrap:wrap}
.ps-btn{padding:4px 12px;border-radius:100px;font-size:11px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;transition:all .15s}
.ps-btn:hover{border-color:#ffffff30;color:var(--text)}
.ps-btn.active-active{color:var(--green);border-color:var(--green);background:var(--green-soft)}
.ps-btn.active-hold{color:var(--yellow);border-color:var(--yellow);background:rgba(250,204,21,.08)}
.ps-btn.active-done{color:var(--blue);border-color:var(--blue);background:var(--blue-soft)}
.ps-btn.active-none{color:var(--dim);border-color:var(--dim)}
.proj-save{align-self:flex-end;padding:7px 16px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s}
.proj-save:hover{opacity:.85}
.proj-saved{font-size:11px;color:var(--green);align-self:flex-end;display:none}

/* ── MODAL ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-backdrop.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:fadeIn .2s ease}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700}
.modal-close{background:none;border:1px solid var(--border);border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:16px;transition:all .15s}
.modal-close:hover{border-color:#ffffff30;color:var(--text)}

.field{margin-bottom:16px}
.field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:7px;font-weight:600}
.field select,.field textarea,.field input[type=date],.field input[type=text]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;outline:none;transition:border-color .15s;-webkit-appearance:none}
.field select{cursor:pointer;color-scheme:dark}
.field textarea{resize:none;height:80px}
.field input[type=date]{color-scheme:dark}
.field select:focus,.field textarea:focus,.field input:focus{border-color:var(--accent)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* meeting-only / win-only fields */
.field.meeting-field,.field.win-field{display:none}

/* upload zone */
.upload-zone{border:1px dashed var(--border);border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:all .15s;position:relative;margin-bottom:16px}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:var(--accent-soft)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone-label{font-size:12px;color:var(--dim);pointer-events:none}
.upload-zone-label span{color:var(--accent)}
.img-preview-wrap{position:relative;display:inline-block;margin-bottom:16px}
.img-preview{max-height:100px;max-width:100%;border-radius:6px;border:1px solid var(--border);display:block}
.img-preview-remove{position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:11px;cursor:pointer;line-height:20px;text-align:center;font-weight:700}

.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.btn-cancel{padding:9px 18px;border-radius:8px;border:1px solid var(--border);background:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s}
.btn-cancel:hover{color:var(--text);border-color:#ffffff30}
.btn-save{padding:9px 20px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:opacity .15s}
.btn-save:hover{opacity:.88}

/* edit mode in modal */
.modal.edit-mode .modal-title::before{content:'Edit — '}

/* lightbox */
.lightbox{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.9);align-items:center;justify-content:center;padding:24px}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:90vh;border-radius:10px;border:1px solid var(--border)}
.lightbox-close{position:fixed;top:20px;right:24px;background:var(--surface);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:13px;padding:10px 20px;border-radius:100px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:300;white-space:nowrap}
.toast.show{opacity:1}

.empty{text-align:center;padding:56px 20px;color:var(--dim);font-size:14px;font-style:italic}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div>
    <h1>My Work Log</h1>
    <p class="subtitle">The laziest way to track what you're actually doing.</p>
  </div>
  <div class="top-actions">
<button class="btn-primary" onclick="openModal()">+ Add new</button>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat"><div class="stat-num orange" id="statTotal">0</div><div class="stat-label">Task logs</div></div>
  <div class="stat"><div class="stat-num blue" id="statMeetings">0</div><div class="stat-label">Meetings</div></div>
  <div class="stat"><div class="stat-num purple" id="statWins">0</div><div class="stat-label">Wins</div></div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('tasks',this)">📋 Tasks</button>
  <button class="tab-btn" onclick="switchTab('meetings',this)">📅 Meetings</button>
  <button class="tab-btn" onclick="switchTab('wins',this)">🏆 Wins</button>
  <button class="tab-btn" onclick="switchTab('projects',this)">🗂 Projects</button>
</div>

<!-- TASKS PANEL -->
<div class="panel active" id="panel-tasks">
  <div class="list-header">
    <div><span class="list-title">Activity log</span><span class="list-count" id="taskCount"></span></div>
    <div class="filter-wrap" id="taskFilterWrap">
      <button class="filter-btn" id="taskFilterBtn" onclick="toggleFilter('task')">
        <span id="taskFilterLabel">Filter</span><span class="arrow">▾</span>
      </button>
      <div class="filter-dropdown" id="taskFilterDropdown"></div>
    </div>
  </div>
  <div class="entry-list" id="taskEntries"></div>
</div>

<!-- MEETINGS PANEL -->
<div class="panel" id="panel-meetings">
  <div class="list-header">
    <div><span class="list-title">Meeting log</span><span class="list-count" id="meetingCount"></span></div>
    <div class="filter-wrap" id="meetingFilterWrap">
      <button class="filter-btn" id="meetingFilterBtn" onclick="toggleFilter('meeting')">
        <span id="meetingFilterLabel">Filter</span><span class="arrow">▾</span>
      </button>
      <div class="filter-dropdown" id="meetingFilterDropdown"></div>
    </div>
  </div>
  <div class="entry-list" id="meetingEntries"></div>
</div>

<!-- WINS PANEL -->
<div class="panel" id="panel-wins">
  <div class="list-header">
    <div><span class="list-title">Wins log</span><span class="list-count" id="winCount"></span></div>
    <div class="filter-wrap" id="winFilterWrap">
      <button class="filter-btn" id="winFilterBtn" onclick="toggleFilter('win')">
        <span id="winFilterLabel">Filter</span><span class="arrow">▾</span>
      </button>
      <div class="filter-dropdown" id="winFilterDropdown"></div>
    </div>
  </div>
  <div class="entry-list" id="winEntries"></div>
</div>

<!-- PROJECTS PANEL -->
<div class="panel" id="panel-projects">
  <div class="list-header" style="margin-bottom:16px">
    <div><span class="list-title">Projects</span><span class="list-count" id="projCount"></span></div>

  </div>
  <div class="proj-grid" id="projectsGrid"></div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-backdrop" id="modalBackdrop" onclick="handleBackdropClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add new entry</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Entry type</label>
        <select id="entryType" onchange="onTypeChange()">
          <option value="task">Task</option>
          <option value="meeting">Meeting</option>
          <option value="win">Win</option>
        </select>
      </div>
      <div class="field">
        <label>Project</label>
        <select id="entryProject">
          <option value="">Select a project…</option>
        </select>
      </div>
    </div>

    <!-- TASK fields -->
    <div class="field">
      <label id="textLabel">What did you do / need to do?</label>
      <textarea id="entryText" placeholder="Describe the task or update…"></textarea>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Date</label>
        <input type="date" id="entryDate">
      </div>
      <div class="field" id="statusField">
        <label>Status</label>
        <select id="entryStatus">
          <option value="In Progress">In Progress</option>
          <option value="Done">Done</option>
          <option value="Blocked">Blocked</option>
        </select>
      </div>
    </div>

    <!-- MEETING fields -->
    <div class="field meeting-field" id="peopleField">
      <label>Who was in the meeting?</label>
      <input type="text" id="entryPeople" placeholder="e.g. Sarah (PM), Lukas (Dev)…">
    </div>
<div class="field meeting-field" id="conclusionField">
      <label>What was concluded / next steps?</label>
      <textarea id="entryConclusion" placeholder="Decisions made, actions assigned…"></textarea>
    </div>

    <!-- WIN fields -->
    <div class="field win-field" id="winPeopleField">
      <label>Who was involved / who noticed?</label>
      <input type="text" id="entryWinPeople" placeholder="e.g. PM Sarah, Head of Procurement…">
    </div>

    <!-- SCREENSHOT (all types) -->
    <div class="field">
      <label>Screenshot <span style="color:var(--dim);font-size:10px;text-transform:none;letter-spacing:0">(optional)</span></label>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelect()">
        <p class="upload-zone-label">Click or drag & drop — <span>attach a screenshot</span></p>
      </div>
      <div id="imagePreview" style="display:none">
        <div class="img-preview-wrap">
          <img class="img-preview" id="previewImg" src="" alt="Preview">
          <button class="img-preview-remove" onclick="clearImage()">✕</button>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="saveBtn" onclick="saveEntry()">Save entry</button>
    </div>
  </div>
</div>


<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="Screenshot">
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────────────
// PROJECTS is now dynamic — loaded from localStorage so new ones persist
let PROJECTS = JSON.parse(localStorage.getItem('projectList') || '["Procurement Companion","Slovenia GMT4","Stein Exception","OSMP","ALCM","Product Dashboard","KPI Store","CTC Dashboard","CC&E","Personal"]');
function saveProjectList(){ localStorage.setItem('projectList', JSON.stringify(PROJECTS)); }

const PROJECT_SEED = {
  "Procurement Companion":{description:"An AI-powered procurement support platform that streamlines contracting and purchasing guidance through modular agents integrated with enterprise procurement tools.",role:"",contacts:"",notes:"",status:"Active"},
  "Slovenia GMT4":{description:"Business-ready dashboards and standard reports to support GMT 4 stakeholder visibility and decision-making in the Slovenia context.",role:"",contacts:"",notes:"",status:"Active"},

async function sbFetch(table,method,body){

async function syncDB(table,data){
  if(!data||!data.length) return;
  const rows=data.map(r=>{
    const row={...r};
    if(row.loggedAt!==undefined){row.loggedat=row.loggedAt;delete row.loggedAt;}
    if(row.image&&row.image.startsWith('data:image')) delete row.image;
    return row;
  });
  sbFetch(table,'POST',rows).catch(e=>console.warn('Sync failed:',e));
}

// ─────────────────────────────────────────────────────────────────────
// LOAD
// ─────────────────────────────────────────────────────────────────────
async function loadData(){
  logs     =JSON.parse(localStorage.getItem('workLogs')||'[]');
  meetings =JSON.parse(localStorage.getItem('workMeetings')||'[]');
  wins     =JSON.parse(localStorage.getItem('workWins')||'[]');
  projectDetails=JSON.parse(localStorage.getItem('projectDetails')||'{}');
  initRender();

  try{
    const [dbT,dbM,dbW,dbP]=await Promise.all([
      sbFetch('tasks?order=id.desc','GET'),
      sbFetch('meetings?order=id.desc','GET'),
      sbFetch('wins?order=id.desc','GET'),
      sbFetch('projects','GET')
    ]);
    let updated=false;
    const norm=arr=>arr.map(r=>{if(r.loggedat){r.loggedAt=r.loggedat;delete r.loggedat;}return r;});

    // Merge by ID — combine local + remote, deduplicate, sort newest first
    // This means entries from all devices are always combined, never lost
    function mergeById(local, remote) {
      if(!remote||!remote.length) return local;
      const merged = [...local];
      norm(remote).forEach(r => {
        if(!merged.find(l => l.id === r.id)) merged.push(r);
      });
      return merged.sort((a,b) => b.id - a.id);
    }

    const mergedT = mergeById(logs, dbT);
    const mergedM = mergeById(meetings, dbM);
    const mergedW = mergeById(wins, dbW);

    if(mergedT.length !== logs.length){ logs=mergedT; localStorage.setItem('workLogs',JSON.stringify(logs)); updated=true; }
    if(mergedM.length !== meetings.length){ meetings=mergedM; localStorage.setItem('workMeetings',JSON.stringify(meetings)); updated=true; }
    if(mergedW.length !== wins.length){ wins=mergedW; localStorage.setItem('workWins',JSON.stringify(wins)); updated=true; }
    if(dbP&&dbP.length){const p={};dbP.forEach(r=>p[r.name]=r.details);if(Object.keys(p).length>Object.keys(projectDetails).length){projectDetails=p;localStorage.setItem('projectDetails',JSON.stringify(projectDetails));updated=true;}}
    if(updated) initRender();
  }catch(e){console.warn('Supabase load failed:',e);}
}

  buildFilterBar('meetingFilterBar',meetings,f=>{activeMeetingFilter=f;renderMeetings();});

  renderTasks();renderMeetings();renderWins();buildProjectCards();updateStats();updateExportBtn();updateProjCount();

function saveEntry(){
  const type  = document.getElementById('entryType').value;
  const proj  = document.getElementById('entryProject').value;
  const text  = document.getElementById('entryText').value.trim();
  const dateV = document.getElementById('entryDate').value;

  if(!proj){showToast('Pick a project first!');return;}
  if(!text){showToast('Write something first!');return;}

  const displayDate=dateV
    ?new Date(dateV+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})
    :new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});

  const now=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

  if(type==='task'){
    const entry={id:editingId||Date.now(),project:proj,text,status:document.getElementById('entryStatus').value,date:displayDate,time:editingId?undefined:now,image:pendingImage||null};
    if(!entry.time){const old=logs.find(l=>l.id===editingId);entry.time=old?old.time:now;}
    if(editingId){logs=logs.map(l=>l.id===editingId?entry:l);}else{logs.unshift(entry);}
    save();
    buildFilterBar('taskFilterBar',logs,f=>{activeTaskFilter=f;renderTasks();});
    renderTasks();
  } else if(type==='meeting'){
    const people=document.getElementById('entryPeople').value.trim();
    const conclusion=document.getElementById('entryConclusion').value.trim();
    const entry={id:editingId||Date.now(),project:proj,people:people||'—',discussed:text,conclusion:conclusion||'—',date:displayDate,loggedAt:now,image:pendingImage||null};
    if(editingId){meetings=meetings.map(m=>m.id===editingId?{...entry,loggedAt:meetings.find(m=>m.id===editingId)?.loggedAt||now}:m);}else{meetings.unshift(entry);}
    saveMeetings();
    buildFilterBar('meetingFilterBar',meetings,f=>{activeMeetingFilter=f;renderMeetings();});
    renderMeetings();
  } else {
    const people=document.getElementById('entryWinPeople').value.trim();
    const entry={id:editingId||Date.now(),project:proj,text,people:people||'—',date:displayDate,loggedAt:now,image:pendingImage||null};
    if(editingId){wins=wins.map(w=>w.id===editingId?entry:w);}else{wins.unshift(entry);}
    saveWins();
    buildFilterBar('winFilterBar',wins,f=>{activeWinFilter=f;renderWins();});
    renderWins();
  }

  updateStats();updateExportBtn();
  closeModal();
  showToast('Entry saved ✓');
}

function buildFilterBar(barId,dataset,onFilter){
  const type=barId.replace('FilterBar','');
  const dropdown=document.getElementById(type+'FilterDropdown');
  if(!dropdown) return;

  // Always show ALL projects in dropdown, not just ones with entries
  const current=type==='task'?activeTaskFilter:type==='meeting'?activeMeetingFilter:activeWinFilter;
  dropdown.innerHTML='';

  const allOpt=document.createElement('div');
  allOpt.className='filter-option'+(current==='All'?' active':'');
  allOpt.textContent='All projects';
  allOpt.onclick=()=>selectFilter(type,'All',onFilter);
  dropdown.appendChild(allOpt);

  const div=document.createElement('div');div.className='filter-divider';
  dropdown.appendChild(div);

  PROJECTS.forEach(p=>{
    const opt=document.createElement('div');
    opt.className='filter-option'+(current===p?' active':'');
    opt.textContent=p;
    opt.onclick=()=>selectFilter(type,p,onFilter);
    dropdown.appendChild(opt);
  });
}

function selectFilter(type,value,onFilter){
  if(type==='task') activeTaskFilter=value;
  else if(type==='meeting') activeMeetingFilter=value;
  else activeWinFilter=value;

  const label=document.getElementById(type+'FilterLabel');
  if(label) label.textContent=value==='All'?'Filter':value;

  const dropdown=document.getElementById(type+'FilterDropdown');
  if(dropdown) dropdown.querySelectorAll('.filter-option').forEach(o=>{
    o.classList.toggle('active',o.textContent===(value==='All'?'All projects':value));
  });

  onFilter(value);
  closeAllFilters();
}

function toggleFilter(type){
  const btn=document.getElementById(type+'FilterBtn');
  const dd=document.getElementById(type+'FilterDropdown');
  const isOpen=dd.classList.contains('open');
  closeAllFilters();
  if(!isOpen){btn.classList.add('open');dd.classList.add('open');}
}

function closeAllFilters(){
  ['task','meeting','win'].forEach(t=>{
    const btn=document.getElementById(t+'FilterBtn');
    const dd=document.getElementById(t+'FilterDropdown');
    if(btn) btn.classList.remove('open');
    if(dd) dd.classList.remove('open');
  });
}

document.addEventListener('click',e=>{
  if(!e.target.closest('.filter-wrap')) closeAllFilters();
});

    contacts:document.getElementById('pcontacts-'+k).value.trim(),
    notes:document.getElementById('pnotes-'+k).value.trim(),
    status:activeBtn?activeBtn.dataset.ps:''
  };
  saveProjectDetails();
  const saved=document.getElementById('psaved-'+k);
  saved.style.display='block';
  setTimeout(()=>saved.style.display='none',1800);
  // refresh dot
  buildProjectCards();
  document.getElementById('pcard-'+k).classList.add('open');
}

// ─────────────────────────────────────────────────────────────────────
// IMAGE
// ─────────────────────────────────────────────────────────────────────
function handleImageSelect(){
  const input=document.getElementById('imageInput');
  const file=input.files[0];
  if(!file) return;
  if(file.size>2*1024*1024) alert('Image over 2MB — consider a smaller screenshot.');
  const reader=new FileReader();
  reader.onload=e=>{
    pendingImage=e.target.result;
    document.getElementById('previewImg').src=pendingImage;
    document.getElementById('imagePreview').style.display='block';
    document.getElementById('uploadZone').style.display='none';
  };
  reader.readAsDataURL(file);
}

function clearImage(){
  pendingImage=null;
  document.getElementById('imageInput').value='';
  document.getElementById('imagePreview').style.display='none';
  document.getElementById('uploadZone').style.display='block';
}

function openLightbox(id,type){
  const dataset=type==='task'?logs:type==='meeting'?meetings:wins;
  const entry=dataset.find(e=>e.id===Number(id)||e.id===id);
  if(!entry||!entry.image) return;
  document.getElementById('lightboxImg').src=entry.image;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeLightbox(e){
  if(e&&e.target!==document.getElementById('lightbox')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow='';
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';}});

// ─────────────────────────────────────────────────────────────────────
// STATS & EXPORT
// ─────────────────────────────────────────────────────────────────────
function updateStats(){
  document.getElementById('statTotal').textContent=logs.length;
  document.getElementById('statMeetings').textContent=meetings.length;
  document.getElementById('statWins').textContent=wins.length;
}

function updateExportBtn(){
  const btn=document.getElementById('exportBtn');
  if(!btn) return;
  const has=logs.length>0||meetings.length>0||wins.length>0;
  btn.disabled=!has;
  btn.title=has?'':'Add at least one entry first';
}

function exportCSV(){
  const esc=v=>`"${String(v||'').replace(/"/g,'""')}"`;
  const taskRows=[['TYPE','PROJECT','TEXT','STATUS','DATE','TIME'],...logs.map(l=>['Task',l.project,l.text,l.status,l.date,l.time])].map(r=>r.map(esc).join(',')).join('\n');
  const meetRows=[['TYPE','PROJECT','WITH','DATE','DISCUSSED','CONCLUDED'],...meetings.map(m=>['Meeting',m.project,m.people,m.date,m.discussed,m.conclusion])].map(r=>r.map(esc).join(',')).join('\n');
  const winRows=[['TYPE','PROJECT','WIN','WHO','DATE'],...wins.map(w=>['Win',w.project,w.text,w.people,w.date])].map(r=>r.map(esc).join(',')).join('\n');
  const csv='TASKS\n'+taskRows+'\n\nMEETINGS\n'+meetRows+'\n\nWINS\n'+winRows;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`work-log-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('✓ CSV downloaded — paste it into Claude!');
}


// ─────────────────────────────────────────────────────────────────────
// PROJECT MANAGEMENT MODAL
// ─────────────────────────────────────────────────────────────────────
let editingProject = null; // name of project being edited, or null for new

function openProjModal(name) {
  editingProject = name || null;
  const title = document.getElementById('projModalTitle');
  const warning = document.getElementById('projDelWarning');
  const deleteBtn = document.getElementById('projDeleteBtn');

  if (name) {
    // Edit mode
    title.textContent = 'Edit project';
    const d = projectDetails[name] || {};
    document.getElementById('projName').value = name;
    document.getElementById('projName').disabled = true; // can't rename (would break links)
    document.getElementById('projDesc').value = d.description || '';
    document.getElementById('projRole').value = d.role || '';
    document.getElementById('projContacts').value = d.contacts || '';
    document.getElementById('projStatus').value = d.status || 'Active';
    deleteBtn.style.display = 'block';

    // Warn if project has entries
    const entryCount = [...logs, ...meetings, ...wins].filter(e => e.project === name).length;
    if (entryCount > 0) {
      warning.style.display = 'block';
      warning.textContent = `⚠ This project has ${entryCount} entr${entryCount === 1 ? 'y' : 'ies'} logged against it. Deleting it won't delete those entries.`;
    } else {
      warning.style.display = 'none';
    }
  } else {
    // Add mode
    title.textContent = 'Add project';
    document.getElementById('projName').value = '';
    document.getElementById('projName').disabled = false;
    document.getElementById('projDesc').value = '';
    document.getElementById('projRole').value = '';
    document.getElementById('projContacts').value = '';
    document.getElementById('projStatus').value = 'Active';
    deleteBtn.style.display = 'none';
    warning.style.display = 'none';
  }

  document.getElementById('projModalBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('projName').focus(), 50);
}

function closeProjModal() {
  document.getElementById('projModalBackdrop').classList.remove('open');
  document.getElementById('projName').disabled = false;
  document.body.style.overflow = '';
  editingProject = null;
}

function handleProjBackdrop(e) {
  if (e.target === document.getElementById('projModalBackdrop')) closeProjModal();
}

function saveProjModal() {
  const name = editingProject || document.getElementById('projName').value.trim();
  if (!name) { showToast('Give the project a name!'); return; }

  // If new project, check for duplicates
  if (!editingProject && PROJECTS.includes(name)) {
    showToast('A project with that name already exists!'); return;
  }

  // Save details
  projectDetails[name] = {
    description: document.getElementById('projDesc').value.trim(),
    role:        document.getElementById('projRole').value.trim(),
    contacts:    document.getElementById('projContacts').value.trim(),
    notes:       (projectDetails[name] || {}).notes || '',
    status:      document.getElementById('projStatus').value
  };

  // Add to list if new
  if (!editingProject) {
    PROJECTS.push(name);
    saveProjectList();
  }

  saveProjectDetails();
  buildProjectSelect();
  buildProjectCards();
  updateProjCount();

  // Update filter bars to include new project if needed
  buildFilterBar('taskFilterBar', logs, f => { activeTaskFilter = f; renderTasks(); });
  buildFilterBar('meetingFilterBar', meetings, f => { activeMeetingFilter = f; renderMeetings(); });
  buildFilterBar('winFilterBar', wins, f => { activeWinFilter = f; renderWins(); });

  closeProjModal();
  showToast(editingProject ? 'Project updated ✓' : 'Project added ✓');
}

function deleteProject() {
  if (!editingProject) return;
  const name = editingProject;

  // Confirm
  const entryCount = [...logs, ...meetings, ...wins].filter(e => e.project === name).length;
  const msg = entryCount > 0
    ? `Delete "${name}"? It has ${entryCount} entries logged — those won't be deleted, just unlinked.`
    : `Delete "${name}"? This can't be undone.`;

  if (!confirm(msg)) return;

  PROJECTS = PROJECTS.filter(p => p !== name);
  delete projectDetails[name];
  saveProjectList();
  saveProjectDetails();
  buildProjectSelect();
  buildProjectCards();
  updateProjCount();
  closeProjModal();
  showToast(`"${name}" deleted`);
}

function updateProjCount() {
  const el = document.getElementById('projCount');
  if (el) el.textContent = ` ${PROJECTS.length} projects`;
}

// ─────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function parseDisplayDate(display){
  if(!display) return new Date().toISOString().slice(0,10);
  try{
    const months={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
    const parts=display.split(' ');
    if(parts.length===3) return `${parts[2]}-${months[parts[1]]||'01'}-${parts[0].padStart(2,'0')}`;
  }catch(e){}
  return new Date().toISOString().slice(0,10);
}

// drag & drop on upload zone
const zone=document.getElementById('uploadZone');
zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag-over');});
zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over'));
zone.addEventListener('drop',e=>{
  e.preventDefault();zone.classList.remove('drag-over');
  const file=e.dataTransfer.files[0];
  if(!file||!file.type.startsWith('image/')) return;
  const dt=new DataTransfer();dt.items.add(file);
  document.getElementById('imageInput').files=dt.files;
  handleImageSelect();
});

// ─────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────
loadData();
</script>
